<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Cadastro de Usuário</title>
    <style>
        body {
            backgroud-color: #f4f7f6
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h2>Criar Nova Conta</h2>
                    <form th:action="@{/cadastro}" th:object="${usuario}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do Usuário:</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="usuário" required autofocus/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Senha:</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Cadastre a senha..." required/>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Cadastrar</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3 bg-light">
                    <span class="text-muted">Acesse agora sua conta?</span>
                    <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Area de Login</a>
                </div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
