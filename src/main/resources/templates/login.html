<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>login</title>
    <style>
        body {
            backgroud-color: #f4f7f6
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Acesso ao Sistema</h4>
                        <div class="card-body p-4">

                            <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
                                    Usuário ou senha invalidos.
                            </div>
                            <div th:if="${param.logout}" class="alert alert-sucess alert-danger text-center" role="alert">
                                Você saiu do sistema com sucesso!
                            </div>

                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label">Usuário</label>
                                    <input type="text" id="username" name="name" class="form-control" required autofocus>
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label">Senha</label>
                                    <input type="password" id="password" name="password" class="form-control" required>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">Entrar</button>
                            </form>
                        </div>
                        <div class="card-footer text-center py-3 bg-light">
                            <span class="text-muted">Ainda não tem acesso?</span>
                            <a th:href="@{/cadastro}" class="text-primary fw-bold text-decoration-none">Cadastre-se</a>
                        </div>
                </div>
            </div>

        </div>
    </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
