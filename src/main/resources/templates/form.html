<!DOCTYPE html>
<html lang="PT-BR" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <title>formulário</title>
</head>
<body>
<nav class="navbar" style="background-color: #e3f2fd;" data-bs-theme="light">
   <div class="logo">
         <h3>Cadastro de Colaborador</h3> 
        <img src="/img/cadastro.png" alt="Cadastro"> 
   </div> 
 
  <a href="/home" id="inicial" class="btn btn-primary me-md-2">Pagina incial</a>
 
</nav>
<div class="containerHome">
    <div th:if="${sucesso}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

<form  class="container w-50 p-3 mb-2 bg-primary-subtle text-primary-emphasis" method="POST" th:object="${form}" th:action="@{/form}">
    <h1>Cadastre</h1>
    <div class="mb-3">
    <label for="nome" class="form-label">Nome: </label>
    <input  class="form-control" th:field="*{nome}" type="text" id="nome" placeholder="digite seu nome"><br>
    </div>
    <div class="mb-3">
    <label for="cpf" class="form-label">cpf: </label>
    <input  class="form-control" th:field="*{cpf}" type="number" id="cpf" placeholder="digite seu cpf"><br>
    </div>
    <div class="mb-3">
    <label for="dataNascimento" class="form-label">Data Nascimento: </label>
    <input  class="form-control" th:field="*{dataNascimento}" type="date" id="dataNascimento" placeholder="digite sua data nascimento"><br>
    </div>
    <div class="mb-3">
    <label for="dataAdmissao" class="form-label">Data de Admissão: </label>
    <input  class="form-control" th:field="*{dataAdmissao}" type="date" id="dataAdmissao" placeholder="digite sua data admissão"><br>
    </div>
    <div class="mb-3">
    <label for="nomeMae" class="form-label">Nome da Mãe: </label>
    <input  class="form-control" th:field="*{nomeMae}" type="text" id="nomeMae" placeholder="digite o nome da sua Mãe"><br>
    </div>
    <div class="mb-3">
    <label for="mateusId" class="form-label">MateusId: </label>
    <input  class="form-control" th:field="*{mateusId}" type="text" id="mateusId" placeholder="digite o Id Mateus"><br>
    </div>
    <button type="submit" class="btn btn-primary">cadastrar</button>
</form>
</div>
<footer>
   <p>  &copy; by Cyro Veras</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
